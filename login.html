<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Havenly – Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e2cbb5, #cfb595);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            max-width: 420px;
            width: 100%;
            background: #fffaf3;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12), 0 6px 16px rgba(0,0,0,0.08);
            padding: 2.5rem 2rem;
            transition: 0.2s;
        }
        .login-card h1 {
            color: #c17a5e;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.2rem;
            font-weight: 800;
        }
        .login-card p.sub {
            text-align: center;
            color: #6b4f3a;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            color: #3b2a1f;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e5d5c5;
            border-radius: 1.5rem;
            font-family: inherit;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
        }
        input:focus {
            border-color: #c17a5e;
            outline: none;
            box-shadow: 0 0 0 3px rgba(193,122,94,0.15);
        }
        .btn {
            width: 100%;
            background: #c17a5e;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn:hover {
            background: #9e5e45;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }
        .links a {
            color: #c17a5e;
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.8rem;
        }
        .back-link a {
            color: #8b6f55;
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .message {
            margin-top: 0.8rem;
            padding: 0.6rem;
            border-radius: 1rem;
            text-align: center;
            font-size: 0.8rem;
            display: none;
        }
        .message.error {
            display: block;
            background: #ffe7e7;
            color: #c62828;
            border: 1px solid #ffc4c4;
        }
        .message.success {
            display: block;
            background: #e6f4ea;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #8b6f55;
            text-align: center;
        }
        @media (max-width: 480px) {
            .login-card { padding: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>Havenly</h1>
    <p class="sub">Welcome back — sign in to continue</p>

    <form id="loginForm">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Username or Email</label>
            <input type="text" id="loginUsername" placeholder="Enter your username or email" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
        <div id="loginMessage" class="message"></div>
    </form>

    <div class="links">
        <a href="signup.html">Create an account</a>
    </div>
    <div class="back-link">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to shop</a>
    </div>
    <div class="footer-note">Use server-assigned profiles or register a new account.</div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const msgDiv = document.getElementById('loginMessage');
    const redirect = 'index.html';
    
    // Adjust base API path if hosting on an alternative domain setup
    const API_BASE = '/api'; 

    // Redirect automatically if an active verification token profile is running
    if (localStorage.getItem('token') && localStorage.getItem('current_user')) {
        window.location.href = redirect;
    }

    loginForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!username || !password) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Please fill in both fields.';
            return;
        }

        try {
            // Dispatches validation parameters to Node entry points
            const response = await fetch(`${API_BASE}/users/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (!response.ok) {
                // Renders backend signature error callbacks (e.g. invalid password)
                msgDiv.className = 'message error';
                msgDiv.innerText = data.error || 'Authentication verification failed.';
                return;
            }

            // Secure session data configurations mapping
            localStorage.setItem('token', data.token);
            localStorage.setItem('current_user', JSON.stringify(data.user));

            msgDiv.className = 'message success';
            msgDiv.innerText = `✅ Welcome back, ${data.user.username}! Redirecting...`;

            setTimeout(() => {
                window.location.href = redirect;
            }, 1000);

        } catch (error) {
            console.error('Login Pipeline Request Error:', error);
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Unable to establish communications loop with Havenly server engine.';
        }
    });
</script>
</body>
</html>
