<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تسجيل الدخول – بيتي على ذوقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --blue: #4A7C9B;
            --blue-dark: #1A3B4C;
            --white: #FFFFFF;
            --warm-bg: #F8F0E3;
            --text: #2C3E50;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, var(--blue-light), var(--blue));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .login-card {
            max-width: 420px; width: 100%;
            background: white; border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .login-card h1 { color: var(--blue); font-size: 2rem; text-align: center; margin-bottom: 0.2rem; }
        .login-card p.sub { text-align: center; color: #6b4f3a; font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; color: var(--text); }
        input {
            width: 100%; padding: 0.8rem 1rem;
            border: 2px solid #e5d5c5; border-radius: 1.5rem;
            font-family: inherit; font-size: 0.9rem;
            background: white; transition: 0.2s;
        }
        input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px rgba(74,124,155,0.15); }
        .btn {
            width: 100%; background: var(--blue); color: white;
            border: none; padding: 0.8rem; border-radius: 2rem;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: 0.2s; margin-top: 0.5rem;
        }
        .btn:hover { background: var(--blue-dark); transform: translateY(-2px); }
        .links { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; }
        .links a { color: var(--blue); text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
        .back-link { display: block; text-align: center; margin-top: 1.2rem; font-size: 0.8rem; }
        .back-link a { color: #6b4f3a; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
        .message {
            margin-top: 0.8rem; padding: 0.6rem; border-radius: 1rem;
            text-align: center; font-size: 0.8rem; display: none;
        }
        .message.error { display: block; background: #ffe7e7; color: #c62828; border: 1px solid #ffc4c4; }
        .message.success { display: block; background: #e6f4ea; color: #2e7d32; border: 1px solid #c8e6c9; }
        .footer-note { margin-top: 1.5rem; font-size: 0.7rem; color: #8b6f55; text-align: center; }
    </style>
</head>
<body>
<div class="login-card">
    <h1>بيتي على ذوقي</h1>
    <p class="sub">سجل الدخول لمتابعة التسوق</p>

    <form id="loginForm">
        <div class="form-group">
            <label><i class="fas fa-user"></i> اسم المستخدم أو البريد</label>
            <input type="text" id="loginUsername" placeholder="أدخل اسم المستخدم أو البريد" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> كلمة المرور</label>
            <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" required>
        </div>
        <button type="submit" class="btn"><i class="fas fa-sign-in-alt"></i> دخول</button>
        <div id="loginMessage" class="message"></div>
    </form>

    <div class="links"><a href="signup.html">إنشاء حساب جديد</a></div>
    <div class="back-link"><a href="index.html"><i class="fas fa-arrow-left"></i> العودة إلى المتجر</a></div>
    <div class="footer-note">تجريبي: test@example.com / test123</div>
</div>

<script>
    const loginForm = document.getElementById('loginForm');
    const msgDiv = document.getElementById('loginMessage');
    const redirect = 'index.html';

    if (localStorage.getItem('بيتي_مستخدم_حالي')) {
        window.location.href = redirect;
    }

    function getUsers() {
        return JSON.parse(localStorage.getItem('بيتي_مستخدمين')) || [];
    }

    loginForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!username || !password) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'الرجاء ملء جميع الحقول.';
            return;
        }

        const users = getUsers();
        const user = users.find(u =>
            u.username.toLowerCase() === username.toLowerCase() ||
            u.email.toLowerCase() === username.toLowerCase()
        );

        if (!user) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'المستخدم غير موجود. يرجى إنشاء حساب.';
            return;
        }

        if (user.password !== password) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'كلمة المرور غير صحيحة.';
            return;
        }

        localStorage.setItem('بيتي_مستخدم_حالي', JSON.stringify({
            username: user.username,
            email: user.email,
            name: user.name || user.username
        }));

        msgDiv.className = 'message success';
        msgDiv.innerText = '✅ مرحباً بعودتك! جارٍ التحويل...';
        setTimeout(() => window.location.href = redirect, 1000);
    });
</script>
</body>
</html>
