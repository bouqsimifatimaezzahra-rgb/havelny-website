<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>إنشاء حساب – بيتي على ذوقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --blue: #4A7C9B;
            --blue-dark: #1A3B4C;
            --white: #FFFFFF;
            --warm-bg: #F8F0E3;
            --text: #2C3E50;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #6A9EC0, #4A7C9B);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .signup-card {
            max-width: 420px; width: 100%;
            background: white; border-radius: 2rem;
            padding: 2.5rem 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .signup-card h1 { color: var(--blue); font-size: 2rem; text-align: center; margin-bottom: 0.2rem; }
        .signup-card p.sub { text-align: center; color: #6b4f3a; font-size: 0.9rem; margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; color: var(--text); }
        input {
            width: 100%; padding: 0.8rem 1rem;
            border: 2px solid #e5d5c5; border-radius: 1.5rem;
            font-family: inherit; font-size: 0.9rem;
            background: white; transition: 0.2s;
        }
        input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px rgba(74,124,155,0.15); }
        .btn {
            width: 100%; background: var(--blue); color: white;
            border: none; padding: 0.8rem; border-radius: 2rem;
            font-weight: 700; font-size: 1rem; cursor: pointer;
            transition: 0.2s; margin-top: 0.5rem;
        }
        .btn:hover { background: var(--blue-dark); transform: translateY(-2px); }
        .links { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; }
        .links a { color: var(--blue); text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
        .back-link { display: block; text-align: center; margin-top: 1.2rem; font-size: 0.8rem; }
        .back-link a { color: #6b4f3a; text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
        .message {
            margin-top: 0.8rem; padding: 0.6rem; border-radius: 1rem;
            text-align: center; font-size: 0.8rem; display: none;
        }
        .message.error { display: block; background: #ffe7e7; color: #c62828; border: 1px solid #ffc4c4; }
        .message.success { display: block; background: #e6f4ea; color: #2e7d32; border: 1px solid #c8e6c9; }
        .footer-note { margin-top: 1.5rem; font-size: 0.7rem; color: #8b6f55; text-align: center; }
    </style>
</head>
<body>
<div class="signup-card">
    <h1>إنشاء حساب</h1>
    <p class="sub">انضم إلى بيتي على ذوقي</p>

    <form id="signupForm">
        <div class="form-group">
            <label><i class="fas fa-user"></i> اسم المستخدم *</label>
            <input type="text" id="signupUsername" placeholder="اختر اسماً" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني (اختياري)</label>
            <input type="email" id="signupEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> كلمة المرور *</label>
            <input type="password" id="signupPassword" placeholder="على الأقل 4 أحرف" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-check-circle"></i> تأكيد كلمة المرور *</label>
            <input type="password" id="signupConfirm" placeholder="أعد كتابة كلمة المرور" required>
        </div>
        <button type="submit" class="btn"><i class="fas fa-user-plus"></i> إنشاء الحساب</button>
        <div id="signupMessage" class="message"></div>
    </form>

    <div class="links">لديك حساب بالفعل؟ <a href="login.html">سجل الدخول</a></div>
    <div class="back-link"><a href="index.html"><i class="fas fa-arrow-left"></i> العودة إلى المتجر</a></div>
    <div class="footer-note">بإنشاء حساب، أنت توافق على شروطنا.</div>
</div>

<script>
    const signupForm = document.getElementById('signupForm');
    const msgDiv = document.getElementById('signupMessage');
    const redirect = 'index.html';

    function getUsers() {
        return JSON.parse(localStorage.getItem('بيتي_مستخدمين')) || [];
    }

    function saveUsers(users) {
        localStorage.setItem('بيتي_مستخدمين', JSON.stringify(users));
    }

    signupForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const username = document.getElementById('signupUsername').value.trim();
        const email = document.getElementById('signupEmail').value.trim().toLowerCase();
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirm').value;

        if (!username || !password || !confirm) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'الرجاء ملء جميع الحقول المطلوبة.';
            return;
        }
        if (password.length < 4) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'كلمة المرور يجب أن تكون 4 أحرف على الأقل.';
            return;
        }
        if (password !== confirm) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'كلمة المرور غير متطابقة.';
            return;
        }

        const users = getUsers();
        if (users.find(u => u.username.toLowerCase() === username.toLowerCase())) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'اسم المستخدم موجود بالفعل.';
            return;
        }
        if (email && users.find(u => u.email.toLowerCase() === email.toLowerCase())) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'البريد الإلكتروني مسجل مسبقاً.';
            return;
        }

        const newUser = {
            id: Date.now(),
            username,
            email: email || '',
            password,
            name: username,
            created: new Date().toISOString()
        };

        users.push(newUser);
        saveUsers(users);

        localStorage.setItem('بيتي_مستخدم_حالي', JSON.stringify({
            username,
            email: email || '',
            name: username
        }));

        msgDiv.className = 'message success';
        msgDiv.innerText = '✅ تم إنشاء الحساب! مرحباً بك! جارٍ التحويل...';
        setTimeout(() => window.location.href = redirect, 1200);
    });
</script>
</body>
</html>
