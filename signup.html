<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Havenly – Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e2cbb5, #cfb595);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .signup-card {
            max-width: 420px;
            width: 100%;
            background: #fffaf3;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12), 0 6px 16px rgba(0,0,0,0.08);
            padding: 2.5rem 2rem;
        }
        .signup-card h1 {
            color: #c17a5e;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 0.2rem;
            font-weight: 800;
        }
        .signup-card p.sub {
            text-align: center;
            color: #6b4f3a;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.3rem;
            color: #3b2a1f;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #e5d5c5;
            border-radius: 1.5rem;
            font-family: inherit;
            font-size: 0.9rem;
            background: white;
            transition: 0.2s;
        }
        input:focus {
            border-color: #c17a5e;
            outline: none;
            box-shadow: 0 0 0 3px rgba(193,122,94,0.15);
        }
        .btn {
            width: 100%;
            background: #c17a5e;
            color: white;
            border: none;
            padding: 0.8rem;
            border-radius: 2rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }
        .btn:hover {
            background: #9e5e45;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .links {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
        }
        .links a {
            color: #c17a5e;
            text-decoration: none;
            font-weight: 600;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.8rem;
        }
        .back-link a {
            color: #8b6f55;
            text-decoration: none;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .message {
            margin-top: 0.8rem;
            padding: 0.6rem;
            border-radius: 1rem;
            text-align: center;
            font-size: 0.8rem;
            display: none;
        }
        .message.error {
            display: block;
            background: #ffe7e7;
            color: #c62828;
            border: 1px solid #ffc4c4;
        }
        .message.success {
            display: block;
            background: #e6f4ea;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }
        .footer-note {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #8b6f55;
            text-align: center;
        }
        @media (max-width: 480px) {
            .signup-card { padding: 1.8rem; }
        }
    </style>
</head>
<body>
<div class="signup-card">
    <h1>Create Account</h1>
    <p class="sub">Join Havenly and start shopping</p>

    <form id="signupForm">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Choose a Username *</label>
            <input type="text" id="signupUsername" placeholder="e.g., john_doe" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-envelope"></i> Email (optional)</label>
            <input type="email" id="signupEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password *</label>
            <input type="password" id="signupPassword" placeholder="Min. 4 characters" required>
        </div>
        <div class="form-group">
            <label><i class="fas fa-check-circle"></i> Confirm Password *</label>
            <input type="password" id="signupConfirm" placeholder="Re‑enter your password" required>
        </div>
        <button type="submit" class="btn"><i class="fas fa-user-plus"></i> Create Account</button>
        <div id="signupMessage" class="message"></div>
    </form>

    <div class="links">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
    <div class="back-link">
        <a href="index.html"><i class="fas fa-arrow-left"></i> Back to shop</a>
    </div>
    <div class="footer-note">By joining, you agree to our terms.</div>
</div>

<script>
    const signupForm = document.getElementById('signupForm');
    const msgDiv = document.getElementById('signupMessage');
    const redirect = 'index.html';
    const API_BASE = '/api';

    signupForm.addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('signupUsername').value.trim();
        const email = document.getElementById('signupEmail').value.trim().toLowerCase();
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirm').value;

        // Front-end Pre-checks validation layers
        if (!username || !password || !confirm) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Please fill in all required fields.';
            return;
        }

        if (password.length < 4) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Password must be at least 4 characters.';
            return;
        }

        if (password !== confirm) {
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Passwords do not match.';
            return;
        }

        try {
            // Dispatches payload structural properties to database endpoints
            const response = await fetch(`${API_BASE}/users/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    username, 
                    email: email || undefined, 
                    password,
                    name: username // Passes default handle value as name string parameters
                })
            });

            const data = await response.json();

            if (!response.ok) {
                // Renders backend database error callbacks (e.g. username taken)
                msgDiv.className = 'message error';
                msgDiv.innerText = data.error || 'Account compilation registry failed.';
                return;
            }

            // Commits auto-login structures upon successful storage execution
            localStorage.setItem('token', data.token);
            localStorage.setItem('current_user', JSON.stringify(data.user));

            msgDiv.className = 'message success';
            msgDiv.innerText = `✅ Account created! Welcome ${username}! Redirecting...`;

            setTimeout(() => {
                window.location.href = redirect;
            }, 1200);

        } catch (error) {
            console.error('Registration Pipeline Error:', error);
            msgDiv.className = 'message error';
            msgDiv.innerText = 'Failed to record entry registration fields with server endpoints.';
        }
    });
</script>
</body>
</html>
