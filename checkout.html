<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>الدفع – بيتي على ذوقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --blue: #4A7C9B;
            --blue-light: #6A9EC0;
            --blue-dark: #1A3B4C;
            --warm-bg: #F8F0E3;
            --white: #FFFFFF;
            --text: #2C3E50;
            --shadow: 0 8px 24px rgba(0,0,0,0.06);
            --radius: 20px;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--warm-bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .checkout-card {
            max-width: 560px; width: 100%;
            background: white; border-radius: var(--radius);
            box-shadow: var(--shadow); overflow: hidden;
        }
        .checkout-header {
            background: var(--blue); color: white;
            padding: 1.2rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .checkout-header h2 { font-size: 1.3rem; }
        .checkout-header a {
            color: white; text-decoration: none;
            background: rgba(255,255,255,0.2);
            padding: 0.3rem 0.8rem; border-radius: 2rem;
        }
        .checkout-body { padding: 1.5rem; }
        .order-summary {
            background: var(--warm-bg); padding: 1rem;
            border-radius: 1rem; margin-bottom: 1.5rem;
        }
        .summary-item { display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid #e5d5c5; }
        .summary-total { font-weight: 800; margin-top: 0.8rem; padding-top: 0.5rem; border-top: 2px dashed #c1a78b; }
        .customer-info {
            background: #f4ede5; padding: 0.8rem;
            border-radius: 0.8rem; margin-bottom: 1rem; font-size: 0.9rem;
        }
        .payment-methods { margin-bottom: 1.2rem; }
        .payment-option {
            display: flex; align-items: center; gap: 0.5rem;
            background: #faf5ee; padding: 0.5rem 0.8rem;
            border-radius: 0.8rem; cursor: pointer;
            border: 2px solid transparent; margin-bottom: 0.3rem;
        }
        .payment-option.selected { border-color: var(--blue); background: #f4ede5; }
        .payment-option input[type="radio"] { accent-color: var(--blue); width: 18px; height: 18px; }
        #cardDetails, #deliveryDetails {
            background: #faf5ee; padding: 1rem;
            border-radius: 0.8rem; margin-bottom: 1rem;
            border: 1px solid #e5d5c5;
        }
        #cardDetails.hidden, #deliveryDetails.hidden { display: none; }
        .form-group { margin-bottom: 0.8rem; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.2rem; }
        input, textarea {
            width: 100%; padding: 0.7rem; border: 1px solid #ccd0d5;
            border-radius: 0.6rem; outline: none; font-family: inherit;
        }
        input:focus, textarea:focus { border-color: var(--blue); }
        .btn-pay {
            background: var(--blue); color: white; border: none;
            width: 100%; padding: 0.8rem; border-radius: 2rem;
            font-weight: 800; cursor: pointer; margin-top: 0.5rem;
            transition: 0.2s;
        }
        .btn-pay:hover { background: var(--blue-dark); }
        .btn-cancel {
            background: #c62828; color: white; border: none;
            width: 100%; padding: 0.7rem; border-radius: 2rem;
            font-weight: 600; cursor: pointer; margin-top: 0.5rem;
        }
        .nav-links {
            display: flex; justify-content: center; gap: 0.8rem;
            margin-top: 1.5rem; flex-wrap: wrap;
        }
        .nav-links a {
            background: var(--blue); color: white;
            padding: 0.4rem 1rem; border-radius: 2rem;
            text-decoration: none; font-weight: 600; font-size: 0.8rem;
        }
        .nav-links a.outline { background: transparent; border: 2px solid var(--blue); color: var(--blue); }
        .notification {
            position: fixed; bottom: 1rem; left: 50%; transform: translateX(-50%);
            background: #2e7d32; color: white; padding: 0.6rem 1.2rem;
            border-radius: 2rem; opacity: 0; transition: 0.2s; z-index: 100;
        }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%;
            border-top-color: #fff; animation: spin 0.8s linear infinite;
            margin-left: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="checkout-card">
    <div class="checkout-header">
        <h2><i class="fas fa-lock"></i> إتمام الدفع</h2>
        <a href="index.html"><i class="fas fa-arrow-left"></i> العودة</a>
    </div>
    <div class="checkout-body">
        <div class="customer-info">
            <strong>👤 العميل:</strong> <span id="customerNameDisplay">زائر</span> (<span id="customerEmailDisplay">—</span>)
        </div>
        <div class="order-summary">
            <h4>طلبك</h4>
            <div id="summaryItems"></div>
            <div class="summary-total" id="summaryTotal"></div>
        </div>

        <!-- طرق الدفع (تم إزالة الدفع عند الوصول) -->
        <div class="payment-methods">
            <h4><i class="fas fa-credit-card"></i> طريقة الدفع</h4>
            <label class="payment-option selected">
                <input type="radio" name="paymentMethod" value="card" checked>
                <span><i class="fas fa-credit-card"></i> بطاقة ائتمان</span>
            </label>
            <label class="payment-option">
                <input type="radio" name="paymentMethod" value="bank">
                <span><i class="fas fa-university"></i> تحويل بنكي</span>
            </label>
        </div>

        <!-- بيانات البطاقة -->
        <div id="cardDetails">
            <div class="form-group"><label>الاسم على البطاقة</label><input type="text" id="cardName" placeholder="أحمد محمد"></div>
            <div class="form-group"><label>رقم البطاقة</label><input type="text" id="cardNumber" placeholder="1234 5678 9012 3456" maxlength="19"></div>
            <div style="display:flex; gap:1rem;">
                <div class="form-group" style="flex:1"><label>تاريخ الانتهاء (شهر/سنة)</label><input type="text" id="cardExpiry" placeholder="12/28"></div>
                <div class="form-group" style="flex:1"><label>رمز CVV</label><input type="password" id="cardCVV" maxlength="4"></div>
            </div>
        </div>

        <!-- بيانات التوصيل (للتحويل البنكي فقط) -->
        <div id="deliveryDetails" class="hidden">
            <h4 style="margin-bottom:0.8rem; color:var(--text);"><i class="fas fa-shipping-fast"></i> معلومات التوصيل</h4>
            <div class="form-group"><label>الاسم الكامل</label><input type="text" id="deliveryName" placeholder="أحمد محمد"></div>
            <div class="form-group"><label>رقم الجوال</label><input type="tel" id="deliveryPhone" placeholder="+966 5 1234 5678"></div>
            <div class="form-group"><label>عنوان التوصيل</label><textarea id="deliveryAddress" rows="3" placeholder="الشارع، المدينة، الرمز البريدي"></textarea></div>
        </div>

        <button class="btn-pay" id="placeOrderBtn"><i class="fas fa-shield-alt"></i> تأكيد الطلب</button>
        <button class="btn-cancel" id="cancelBtn"><i class="fas fa-times"></i> إلغاء والعودة</button>

        <div class="nav-links">
            <a href="index.html" class="outline"><i class="fas fa-store"></i> المتجر</a>
            <a href="add-product.html"><i class="fas fa-plus"></i> إضافة منتج</a>
        </div>
    </div>
</div>
<div id="notification" class="notification"></div>

<script>
    const STORE_EMAIL = 'youremail@gmail.com';
    let cart = JSON.parse(localStorage.getItem('بيتي_سلة')) || [];
    const currentCustomer = JSON.parse(localStorage.getItem('بيتي_مستخدم_حالي')) || null;
    const cardDetailsDiv = document.getElementById('cardDetails');
    const deliveryDetailsDiv = document.getElementById('deliveryDetails');
    const paymentRadios = document.querySelectorAll('input[name="paymentMethod"]');
    const placeOrderBtn = document.getElementById('placeOrderBtn');

    if (currentCustomer) {
        document.getElementById('customerNameDisplay').innerText = currentCustomer.name || currentCustomer.username || 'زائر';
        document.getElementById('customerEmailDisplay').innerText = currentCustomer.email || '—';
    }

    function toggleSections() {
        const selected = document.querySelector('input[name="paymentMethod"]:checked');
        if (!selected) return;
        if (selected.value === 'card') {
            cardDetailsDiv.classList.remove('hidden');
            deliveryDetailsDiv.classList.add('hidden');
            document.querySelectorAll('#cardDetails input').forEach(inp => inp.required = true);
            document.querySelectorAll('#deliveryDetails input, #deliveryDetails textarea').forEach(inp => inp.required = false);
        } else {
            cardDetailsDiv.classList.add('hidden');
            deliveryDetailsDiv.classList.remove('hidden');
            document.querySelectorAll('#cardDetails input').forEach(inp => inp.required = false);
            document.querySelectorAll('#deliveryDetails input, #deliveryDetails textarea').forEach(inp => inp.required = true);
        }
    }
    paymentRadios.forEach(r => r.addEventListener('change', toggleSections));
    toggleSections();

    document.querySelectorAll('.payment-option').forEach(opt => {
        opt.addEventListener('click', function() {
            const radio = this.querySelector('input[type="radio"]');
            if (radio) radio.checked = true;
            document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
            this.classList.add('selected');
            toggleSections();
        });
    });

    function renderSummary() {
        const container = document.getElementById('summaryItems');
        const totalSpan = document.getElementById('summaryTotal');
        if (cart.length === 0) {
            container.innerHTML = '<p>سلة فارغة</p>';
            totalSpan.innerText = 'الإجمالي: 0.00 ر.س';
            return;
        }
        let itemsHtml = '', total = 0;
        cart.forEach(i => {
            const itemTotal = i.price * i.qty;
            total += itemTotal;
            itemsHtml += `<div class="summary-item"><span>${i.name} ×${i.qty}</span><span>${itemTotal.toFixed(2)} ر.س</span></div>`;
        });
        container.innerHTML = itemsHtml;
        totalSpan.innerHTML = `الإجمالي: ${total.toFixed(2)} ر.س`;
    }
    renderSummary();

    function showMsg(msg, isErr = false) {
        const n = document.getElementById('notification');
        n.innerText = msg;
        n.style.opacity = '1';
        n.style.background = isErr ? '#c62828' : '#2e7d32';
        setTimeout(() => n.style.opacity = '0', 3000);
    }

    function updateButtonState() {
        if (cart.length === 0) {
            placeOrderBtn.disabled = true;
            placeOrderBtn.innerHTML = '<i class="fas fa-times-circle"></i> السلة فارغة';
        } else {
            placeOrderBtn.disabled = false;
            placeOrderBtn.innerHTML = '<i class="fas fa-shield-alt"></i> تأكيد الطلب';
        }
    }
    updateButtonState();

    placeOrderBtn.addEventListener('click', function() {
        if (cart.length === 0) {
            showMsg('❌ السلة فارغة.', true);
            return;
        }

        const method = document.querySelector('input[name="paymentMethod"]:checked').value;
        const customerName = currentCustomer ? (currentCustomer.name || currentCustomer.username) : 'زائر';
        const customerEmail = currentCustomer ? currentCustomer.email : 'guest@checkout.com';

        let cardName, cardNumber, cardExpiry, cardCVV;
        let deliveryName, deliveryPhone, deliveryAddress;

        if (method === 'card') {
            cardName = document.getElementById('cardName').value.trim();
            cardNumber = document.getElementById('cardNumber').value.replace(/\s/g, '');
            cardExpiry = document.getElementById('cardExpiry').value;
            cardCVV = document.getElementById('cardCVV').value;
            if (!cardName || cardNumber.length < 13 || !cardExpiry.match(/^\d{2}\/\d{2}$/) || !cardCVV.match(/^\d{3,4}$/)) {
                showMsg('❌ يرجى ملء بيانات البطاقة بشكل صحيح.', true);
                return;
            }
        } else {
            deliveryName = document.getElementById('deliveryName').value.trim();
            deliveryPhone = document.getElementById('deliveryPhone').value.trim();
            deliveryAddress = document.getElementById('deliveryAddress').value.trim();
            if (!deliveryName || !deliveryPhone || !deliveryAddress) {
                showMsg('❌ يرجى ملء جميع بيانات التوصيل.', true);
                return;
            }
        }

        placeOrderBtn.disabled = true;
        placeOrderBtn.innerHTML = '<span class="spinner"></span> جارٍ المعالجة...';

        const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

        const order = {
            id: Date.now(),
            customerName, customerEmail,
            orderDate: new Date().toISOString(),
            paymentMethod: method === 'card' ? 'بطاقة ائتمان' : 'تحويل بنكي',
            paymentStatus: method === 'card' ? 'مدفوع' : 'معلق',
            items: cart.map(item => ({
                name: item.name, price: item.price, qty: item.qty,
                selectedColor: item.selectedColor || '—',
                selectedSize: item.selectedSize || '—',
                customHeight: item.customHeight || null,
                orderDate: item.orderDate || null,
                notes: item.notes || null
            })),
            total,
            status: method === 'card' ? 'paid' : 'pending',
            notes: cart.map(i => i.notes).filter(n => n).join(' | ') || '',
            deliveryName: method !== 'card' ? deliveryName : undefined,
            deliveryPhone: method !== 'card' ? deliveryPhone : undefined,
            deliveryAddress: method !== 'card' ? deliveryAddress : undefined
        };

        let orders = JSON.parse(localStorage.getItem('بيتي_طلبات')) || [];
        orders.push(order);
        localStorage.setItem('بيتي_طلبات', JSON.stringify(orders));

        const itemsText = cart.map(i => `${i.name} ×${i.qty} = ${(i.price * i.qty).toFixed(2)} ر.س`).join('\n');
        const paymentMsg = method === 'card' ? 'مدفوع ببطاقة ائتمان' : 'تحويل بنكي (معلق)';
        let deliveryMsg = '';
        if (method !== 'card') {
            deliveryMsg = `\nمعلومات التوصيل:\nالاسم: ${deliveryName}\nالجوال: ${deliveryPhone}\nالعنوان: ${deliveryAddress}`;
        }
        const fullMessage = `العميل: ${customerName} (${customerEmail})\n\nطريقة الدفع: ${paymentMsg}${deliveryMsg}\n\nالمنتجات:\n${itemsText}\n\nالإجمالي: ${total.toFixed(2)} ر.س`;

        fetch('https://formsubmit.co/ajax/' + STORE_EMAIL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: customerName,
                email: customerEmail,
                subject: '🪑 طلب جديد من بيتي على ذوقي',
                message: fullMessage,
                _captcha: 'false'
            })
        }).catch(() => {});

        if (customerEmail && customerEmail !== 'guest@checkout.com') {
            fetch('https://formsubmit.co/ajax/' + customerEmail, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: customerName,
                    email: customerEmail,
                    subject: '✅ تأكيد طلبك',
                    message: `شكراً لك على طلبك، ${customerName}!\n\nرقم الطلب: #${order.id}\n${fullMessage}\n\nسيتم معالجته قريباً.\n\n— فريق بيتي على ذوقي`,
                    _captcha: 'false'
                })
            }).catch(() => {});
        }

        localStorage.removeItem('بيتي_سلة');
        cart.length = 0;

        setTimeout(() => {
            window.location.href = 'thankyou.html';
        }, 1000);
    });

    document.getElementById('cancelBtn').addEventListener('click', function() {
        if (cart.length > 0 && !confirm('سيتم تفريغ السلة. هل تريد المتابعة؟')) return;
        localStorage.removeItem('بيتي_سلة');
        window.location.href = 'index.html';
    });

    document.getElementById('cardNumber').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\s/g, '');
        if (v.length > 16) v = v.slice(0, 16);
        let f = v.match(/.{1,4}/g)?.join(' ') || v;
        e.target.value = f;
    });
    document.getElementById('cardExpiry').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length >= 2) v = v.slice(0, 2) + '/' + v.slice(2, 4);
        e.target.value = v.slice(0, 5);
    });
</script>
</body>
</html>
